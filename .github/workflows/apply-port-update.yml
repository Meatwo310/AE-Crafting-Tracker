name: Apply port update

on:
  push:
    branches:
      - agent/forge-1.20.1-port-final
    paths:
      - '.port-update.tar.gz.b64'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Apply archive
        run: |
          base64 -d .port-update.tar.gz.b64 > "$RUNNER_TEMP/port-update.tar.gz"
          tar -xzf "$RUNNER_TEMP/port-update.tar.gz"
          rm -f .port-update.tar.gz.b64
          rm -f src/forge1201/java/org/chatterjay/craftingtracker/client/ClientTracker.java
          rm -f .github/workflows/export-port-source.yml
          rm -f .github/workflows/apply-port-update.yml
      - name: Commit port
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete Forge 1.20.1 feature port'
          git push origin HEAD:${{ github.ref_name }}
