name: Export source for porting

on:
  push:
    branches:
      - agent/forge-1.20.1-port
    paths:
      - '.github/workflows/export-source.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive source
        run: tar --exclude=.git -czf "$RUNNER_TEMP/ae-crafting-tracker-source.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: ae-crafting-tracker-source
          path: ${{ runner.temp }}/ae-crafting-tracker-source.tar.gz
          if-no-files-found: error
