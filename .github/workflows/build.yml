name: Build

on:
  workflow_dispatch:
  push:
    branches: [master, 'agent/**']
    paths-ignore: ['**/*.md', 'docs/**']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**']

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew --no-daemon build 2>&1 | tee build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: build.log
          if-no-files-found: ignore
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: crafting-tracker-1.20.1-forge
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar
          if-no-files-found: error
      - name: Stage runtime mods
        run: |
          mkdir -p run/mods
          find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' -exec cp {} run/mods/ \;
          find build/ciRuntimeMods -maxdepth 1 -type f -name '*.jar' -exec cp {} run/mods/ \;
          ls -la run/mods
      - name: Minecraft runtime smoke test
        timeout-minutes: 10
        uses: headlesshq/mc-runtime-test@4.5.0
        with:
          mc: 1.20.1
          modloader: forge
          regex: '.*crafting_tracker.*'
          mc-runtime-test: lexforge
          java: 17
