name: Apply port update

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forge-1.20.1-port-final
      - name: Apply archive
        run: |
          cat .port-update.part-* > "$RUNNER_TEMP/port-update.b64"
          base64 -d "$RUNNER_TEMP/port-update.b64" > "$RUNNER_TEMP/port-update.tar.gz"
          tar -xzf "$RUNNER_TEMP/port-update.tar.gz"
          rm -f .port-update.part-* .port-update.ready
          rm -f src/forge1201/java/org/chatterjay/craftingtracker/client/ClientTracker.java
      - name: Commit port
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete Forge 1.20.1 feature port'
          git push origin HEAD:agent/forge-1.20.1-port-final
